name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BUILD_TYPE: Release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            triplet: x64-linux
            onnxruntime_ep: cpu
            dml: OFF
            artifact_name: linux-x64
            package_ext: AppImage
          - os: macos-14
            triplet: arm64-osx
            onnxruntime_ep: cpu
            dml: OFF
            artifact_name: macos-arm64
            package_ext: dmg
          - os: windows-latest
            triplet: x64-windows
            onnxruntime_ep: dml
            dml: ON
            artifact_name: windows-x64
            package_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 ccache file

      - name: Setup ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.triplet }}
          max-size: 500M

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.3'
          cache: true

      - name: Initialize MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Setup sccache (Windows)
        if: runner.os == 'Windows'
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Configure sccache (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $env:GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $env:GITHUB_ENV

      - name: Configure Qt6 path (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "QT_DIR=$QT_ROOT_DIR" >> $GITHUB_ENV
          echo "QT6_DIR=$QT_ROOT_DIR" >> $GITHUB_ENV
          echo "GH_WORKSPACE=${{github.workspace}}" >> $GITHUB_ENV

      - name: Configure Qt6 path (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "QT_DIR=$QT_ROOT_DIR" | sed 's/\\/\//g' >> $GITHUB_ENV
          echo "QT6_DIR=$QT_ROOT_DIR" | sed 's/\\/\//g' >> $GITHUB_ENV
          echo "GH_WORKSPACE=${{github.workspace}}" | sed 's/\\/\//g' >> $GITHUB_ENV

      - name: Verify Qt Installation
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "QT_DIR: $QT6_DIR"
          ls -l "$QT6_DIR/lib/cmake/Qt6"

      - name: Install vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 14bb451131ccf6be50a63a8d9dfe7980e46b5958

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/vcpkg/installed
          key: vcpkg-installed-${{ matrix.triplet }}-${{ hashFiles('scripts/vcpkg-manifest/vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-${{ matrix.triplet }}-

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Build Vcpkg packages (Unix)
        if: runner.os != 'Windows'
        working-directory: ${{github.workspace}}/vcpkg
        run: |
          ./vcpkg install \
            --x-manifest-root=../scripts/vcpkg-manifest \
            --x-install-root=./installed \
            --triplet=${{ matrix.triplet }}
        env:
          CMAKE_PREFIX_PATH: ${{env.QT_DIR}}
          QT_DIR: ${{env.QT_DIR}}
          Qt6_DIR: ${{env.QT_DIR}}
          VCPKG_BUILD_TYPE: release
          VCPKG_KEEP_ENV_VARS: 'CMAKE_PREFIX_PATH;QT_DIR;Qt6_DIR;VCPKG_BUILD_TYPE'

      - name: Build Vcpkg packages (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: ${{github.workspace}}/vcpkg
        run: |
          vcpkg.exe install --x-manifest-root=../scripts/vcpkg-manifest --x-install-root=./installed --triplet=${{ matrix.triplet }}
        env:
          CMAKE_PREFIX_PATH: ${{env.QT_DIR}}
          QT_DIR: ${{env.QT_DIR}}
          Qt6_DIR: ${{env.QT_DIR}}
          VCPKG_BUILD_TYPE: release
          VCPKG_KEEP_ENV_VARS: 'CMAKE_PREFIX_PATH;QT_DIR;Qt6_DIR;VCPKG_BUILD_TYPE'

      - name: Install OnnxRuntime (Unix)
        if: runner.os != 'Windows'
        working-directory: ${{github.workspace}}/src/infer
        run: |
          cmake -Dep=${{ matrix.onnxruntime_ep }} -P ../../cmake/setup-onnxruntime.cmake

      - name: Install OnnxRuntime (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: ${{github.workspace}}/src/infer
        run: |
          cmake -Dep=${{ matrix.onnxruntime_ep }} -P ../../cmake/setup-onnxruntime.cmake

      - name: Configure CMake
        shell: bash
        run: |
          EXTRA_CMAKE_ARGS=""
          if [ "$RUNNER_OS" != "Windows" ]; then
            EXTRA_CMAKE_ARGS="-DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
          else
            EXTRA_CMAKE_ARGS="-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache"
          fi
          cmake -B ${{github.workspace}}/build -G Ninja \
            -DBUILD_TESTS:BOOL=OFF \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/deploy \
            -DCMAKE_PREFIX_PATH=${{env.QT_DIR}}/lib/cmake/Qt6/ \
            -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DONNXRUNTIME_ENABLE_DML=${{ matrix.dml }} \
            $EXTRA_CMAKE_ARGS

      - name: Build
        run: cmake --build ${{github.workspace}}/build --target all

      - name: Install
        run: cmake --build ${{github.workspace}}/build --target install

      - name: Set version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      # ── Windows: Portable ZIP ──────────────────────────────────────
      - name: Package portable ZIP (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{github.workspace}}/deploy
        shell: bash
        run: |
          ARCHIVE_NAME="dataset-tools-${{ matrix.artifact_name }}-${{ env.VERSION }}.zip"
          7z a "$ARCHIVE_NAME" ./*
          echo "PACKAGE_PATH=${{github.workspace}}/deploy/${ARCHIVE_NAME}" >> $GITHUB_ENV

      # ── macOS: DMG ─────────────────────────────────────────────────
      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        working-directory: ${{github.workspace}}/deploy
        run: |
          DMG_NAME="dataset-tools-${{ matrix.artifact_name }}-${{ env.VERSION }}.dmg"
          DMG_STAGING="${{ github.workspace }}/dmg_staging"

          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R *.app "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create \
            -volname "Dataset Tools" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            "${{ github.workspace }}/deploy/${DMG_NAME}"

          rm -rf "$DMG_STAGING"
          echo "PACKAGE_PATH=${{ github.workspace }}/deploy/${DMG_NAME}" >> $GITHUB_ENV

      # ── Linux: AppImage ────────────────────────────────────────────
      - name: Download linuxdeploy tools (Linux)
        if: runner.os == 'Linux'
        working-directory: ${{ github.workspace }}
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          chmod +x linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage -O linuxdeploy-plugin-qt
          chmod +x linuxdeploy-plugin-qt

      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        working-directory: ${{ github.workspace }}
        run: |
          APPDIR="${{ github.workspace }}/AppDir"
          DEPLOY="${{ github.workspace }}/deploy"

          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/lib" "$APPDIR/usr/share/applications"

          for exe in LabelSuite DsLabeler dstools-cli; do
            if [ -f "$DEPLOY/$exe" ]; then
              cp "$DEPLOY/$exe" "$APPDIR/usr/bin/"
            fi
          done

          if ls "$DEPLOY"/*.so* 1>/dev/null 2>&1; then
            cp "$DEPLOY"/*.so* "$APPDIR/usr/lib/"
          fi

          if [ -d "$DEPLOY/dict" ]; then
            cp -R "$DEPLOY/dict" "$APPDIR/usr/bin/dict"
          fi

          cat > "$APPDIR/dataset-tools.desktop" << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Dataset Tools
          Comment=Dataset processing tools for singing voice synthesis
          Exec=LabelSuite
          Icon=dataset-tools
          Categories=AudioVideo;Audio;
          Terminal=false
          DESKTOP

          cat > "$APPDIR/AppRun" << 'LAUNCHER'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH}"
          export QT_PLUGIN_PATH="${HERE}/usr/plugins:${QT_PLUGIN_PATH}"
          export QML2_IMPORT_PATH="${HERE}/usr/qml:${QML2_IMPORT_PATH}"

          CALLED_AS=$(basename "$0")
          if [ "$CALLED_AS" != "AppRun" ] && [ "$CALLED_AS" != "dataset-tools" ] && [ -x "${HERE}/usr/bin/$CALLED_AS" ]; then
              exec "${HERE}/usr/bin/$CALLED_AS" "$@"
          fi

          exec "${HERE}/usr/bin/LabelSuite" "$@"
          LAUNCHER
          chmod +x "$APPDIR/AppRun"

          export QMAKE="${{ env.QT_DIR }}/bin/qmake"
          export PATH="${{ env.QT_DIR }}/bin:$PATH"
          export OUTPUT="${{ github.workspace }}/deploy/dataset-tools-${{ matrix.artifact_name }}-${{ env.VERSION }}.AppImage"

          ./linuxdeploy --appdir "$APPDIR" --plugin qt --output appimage

          if [ ! -f "$OUTPUT" ]; then
            echo "::error::AppImage was not created at expected path"
            ls -la *.AppImage 2>/dev/null || true
            exit 1
          fi

          echo "PACKAGE_PATH=$OUTPUT" >> $GITHUB_ENV

